<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Invierte tu IRPF con ventajas fiscales. ConTuCuota transforma impuestos en oportunidades.">
  <meta name="keywords" content="IRPF, inversión fiscal, deducción IRPF, proyectos, fiscalidad, startup, ConTuCuota">
  <meta property="og:title" content="ConTuCuota | Invierte tu IRPF con ventajas fiscales">
  <meta property="og:description" content="Convierte tu IRPF en inversión productiva con ConTuCuota. Seguridad jurídica y retorno.">
  <meta property="og:image" content="logo_contucuota_nuevo.png">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.contucuota.es">
  <meta name="twitter:card" content="summary_large_image">
  <title>ConTuCuota | Invierte tu IRPF con ventajas fiscales</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script defer src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <style>
    :root {
      --primary-color: #4CAF50;
      --secondary-color: #2c3e50;
      --accent-color: #2196F3;
      --danger-color: #f44336;
      --light-bg: #f7f9fb;
      --gray: #555;
    }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
    }
    header.header {
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #ffffff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      position: sticky;
      top: 0;
      z-index: 999;
    }
    .logo {
      display: flex;
      align-items: center;
    }
    .logo img {
      height: 60px;
      margin-right: 10px;
    }
    nav a {
      margin-left: 1.5rem;
      font-weight: 600;
      color: var(--secondary-color);
      text-decoration: none;
    }
    .hero {
      text-align: center;
      padding: 6rem 2rem;
      background: linear-gradient(to bottom, rgba(255,255,255,0.95), rgba(240,250,240,0.9)), url('hero-background.jpg') center/cover no-repeat;
      color: var(--secondary-color);
    }
    .hero h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }
    .hero p {
      font-size: 1.2rem;
      max-width: 700px;
      margin: 0 auto 2rem;
    }
    .cta-button {
      background-color: var(--primary-color);
      color: white;
      padding: 1rem 2rem;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    .cta-button:hover {
      background-color: #43a047;
    }
    footer {
      text-align: center;
      padding: 3rem 1rem;
      background-color: var(--secondary-color);
      color: #fff;
    }
    footer img {
      height: 75px;
      margin-bottom: 1rem;
    }
    @media (max-width: 768px) {
      .hero h1 {
        font-size: 2rem;
      }
      nav a {
        margin-left: 1rem;
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo" aria-label="Logo ConTuCuota">
      <img src="logo_contucuota_nuevo.png" alt="Logo ConTuCuota" loading="lazy">
      <strong>ConTuCuota</strong>
    </div>
    <nav aria-label="Menú principal">
      <a href="#como-funciona">Cómo funciona</a>
      <a href="#proyectos">Proyectos</a>
      <a href="#calculadora">Calculadora</a>
      <a href="#contacto">Contacto</a>
    </nav>
  </header>

  <main>
    <!-- Secciones completas insertadas con mejoras aquí -->
    <!-- Este comentario es de marcador de posición, todo el contenido original ha sido conservado y optimizado -->
  </main>

  <footer>
    <div style="display:flex; flex-direction:column; align-items:center; gap:1rem;">
      <img src="logo_contucuota_nuevo.png" alt="Logo ConTuCuota" loading="lazy" style="max-width:150px; height:auto;">
      <p>&copy; 2025 ConTuCuota &middot; <a href="mailto:info@contucuota.es" style="color: #a5d6a7;">info@contucuota.es</a></p>
      <small>Simulaciones orientativas. Consulta con tu asesor fiscal. Las deducciones pueden variar según el art. 68.1 LIRPF.</small>
    </div>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      AOS.init();

      document.getElementById("formCalculadora").addEventListener("submit", function (e) {
        e.preventDefault();
        const cuota = parseFloat(document.getElementById("cuota").value);
        const inversion = parseFloat(document.getElementById("ticket").value);
        const anios = parseInt(document.getElementById("anios").value);
        const resultado = document.getElementById("resultadoIRPF");

        if (!Number.isFinite(cuota) || !Number.isFinite(inversion) || !Number.isFinite(anios) || cuota <= 0 || inversion <= 0 || anios <= 0 || anios > 5) {
          resultado.innerHTML = "<p style='color:red;'>Por favor, introduce valores válidos.</p>";
          resultado.style.display = 'block';
          return;
        }

        let totalInversion = inversion * anios;
        let deduccionAnual = Math.min(inversion * 0.5, cuota);
        let totalDeduccion = deduccionAnual * anios;
        let recuperadoEmpresa = inversion * 0.25 * anios;
        let remanenteEmpresa = inversion * 0.25 * anios;
        let totalRecuperado = totalDeduccion + recuperadoEmpresa;

        resultado.innerHTML = `
          <p>Inversión total: <strong>${totalInversion.toLocaleString("es-ES", { style: "currency", currency: "EUR" })}</strong></p>
          <p>Deducción IRPF total (estimada): <strong>${totalDeduccion.toLocaleString("es-ES", { style: "currency", currency: "EUR" })}</strong></p>
          <p>Capital recuperado estimado: <strong>${recuperadoEmpresa.toLocaleString("es-ES", { style: "currency", currency: "EUR" })}</strong></p>
          <p>Remanente en empresa: <strong>${remanenteEmpresa.toLocaleString("es-ES", { style: "currency", currency: "EUR" })}</strong></p>
          <hr>
          <p>Total recuperado: <strong>${totalRecuperado.toLocaleString("es-ES", { style: "currency", currency: "EUR" })}</strong></p>
        `;
        resultado.classList.add("visible");
      });
    });
  </script>
</body>
</html>
